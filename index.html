<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一间小屋 | Personal Blog Platform</title>
  <meta name="description" content="A quiet, self-hosted personal writing room.">
  <meta property="og:title" content="一间小屋 | Personal Blog Platform">
  <meta property="og:description" content="A quiet, self-hosted personal writing room.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="一间小屋 | Personal Blog Platform">
  <meta name="twitter:description" content="A quiet, self-hosted personal writing room.">
  <link rel="alternate" type="application/rss+xml" title="一间小屋 RSS" href="feed.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #1f1f1f;
      --muted: #6b6b6b;
      --line: #e8e8e8;
      --soft: #f7f7f7;
      --chip: #f2f2f2;
      --dark: #111111;
      --white: #ffffff;
      --danger: #8f1f1f;
      --ui-font: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --serif-font: Lora, Georgia, "Times New Roman", serif;
      --rail-motion: 520ms cubic-bezier(0.2, 0, 0, 1);
      --rail-fade-motion: 440ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: var(--text);
      font-family: var(--ui-font);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .progress-wrap {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 30;
      width: 100%;
      height: 3px;
      background: transparent;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: var(--dark);
      transition: width 80ms linear;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 36px max-content minmax(220px, 420px) 1fr;
      align-items: center;
      gap: 18px;
      min-height: 57px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      transition: grid-template-columns var(--rail-motion);
    }

    body.editor-mode .topbar,
    body.editor-mode .progress-wrap {
      display: none;
    }

    .menu-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--dark);
      cursor: pointer;
    }

    .menu-button span,
    .menu-button::before,
    .menu-button::after {
      display: block;
      width: 24px;
      height: 1px;
      background: currentColor;
      content: "";
      transition: transform 220ms cubic-bezier(0.4, 0, 0.2, 1), opacity 180ms ease, width 220ms ease;
    }

    .menu-button {
      flex-direction: column;
      gap: 6px;
    }

    /* Collapsed state: top bar tilts to /, bottom bar tilts to \, middle fades */
    body.sidebar-collapsed .menu-button::before {
      transform: translateY(7px) rotate(45deg);
    }

    body.sidebar-collapsed .menu-button span {
      opacity: 0;
      transform: scaleX(0);
    }

    body.sidebar-collapsed .menu-button::after {
      transform: translateY(-7px) rotate(-45deg);
    }

    .brand {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--dark);
      text-decoration: none;
      white-space: nowrap;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: #f9f9f9;
      color: var(--muted);
      font-family: var(--ui-font);
    }

    .search-box input {
      min-width: 0;
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--dark);
      font-size: 15px;
    }

    .search-box:focus-within {
      border-color: var(--line);
      background: var(--white);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      justify-self: end;
      justify-content: flex-end;
      gap: 12px;
    }

    .button,
    .nav-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 16px;
      border: 1px solid var(--dark);
      border-radius: 999px;
      background: var(--white);
      color: var(--dark);
      font-family: var(--ui-font);
      font-size: 14px;
      line-height: 1;
      text-decoration: none;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease, transform 120ms ease;
    }

    .button:hover,
    .nav-button:hover {
      transform: translateY(-1px);
    }

    .button.primary,
    .nav-button.primary {
      background: var(--dark);
      color: var(--white);
    }

    .nav-button.write-link {
      gap: 8px;
      min-height: 38px;
      padding: 0 8px;
      border-color: transparent;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
    }

    .nav-button.write-link:hover {
      color: var(--dark);
      transform: none;
    }

    .nav-write-icon {
      display: inline-flex;
      width: 22px;
      height: 22px;
      color: currentColor;
    }

    .nav-write-icon svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .button.ghost {
      border-color: var(--line);
    }

    .button.danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    .icon-button {
      width: 38px;
      min-width: 38px;
      height: 38px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--white);
      color: var(--dark);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      cursor: pointer;
    }

    main {
      padding: 0;
    }

    .shell,
    article {
      max-width: 680px;
      margin: 0 auto;
    }

    .wide-shell {
      max-width: 1040px;
      margin: 0 auto;
      padding: 56px 24px 72px;
    }

    .platform-layout {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr) 352px;
      min-height: calc(100vh - 57px);
      padding-inline: 0;
      transition:
        grid-template-columns var(--rail-motion),
        padding-inline var(--rail-motion);
    }

    body.sidebar-collapsed .platform-layout {
      grid-template-columns: 0 minmax(0, 1fr) 352px;
    }

    body.sidebar-collapsed .platform-layout:not(.article-platform):not(.library-platform) {
      padding-inline: clamp(0px, calc((100vw - 1280px) / 2), 80px);
    }

    .article-platform,
    .library-platform {
      grid-template-columns: 248px minmax(0, 1fr);
    }

    body.sidebar-collapsed .article-platform,
    body.sidebar-collapsed .library-platform {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    .article-platform .article-wrap,
    .library-platform .library-shell {
      min-width: 0;
    }

    .left-rail,
    .right-rail {
      position: sticky;
      top: 57px;
      align-self: start;
      height: calc(100vh - 57px);
      overflow: hidden auto;
      border-color: var(--line);
      font-family: var(--ui-font);
    }

    .left-rail {
      position: sticky;
      border-right: 1px solid var(--line);
      padding: 42px 28px;
      min-width: 0;
      opacity: 1;
      transform: translateX(0);
      transition:
        opacity var(--rail-fade-motion),
        transform var(--rail-motion),
        padding var(--rail-motion),
        border-color var(--rail-fade-motion);
      will-change: opacity, transform, padding;
    }

    body.sidebar-collapsed .left-rail {
      padding-right: 0;
      padding-left: 0;
      border-right-color: transparent;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-24px);
    }

    .right-rail {
      border-left: 1px solid var(--line);
      padding: 42px 32px;
      opacity: 1;
      transform: translateX(0);
      transition:
        opacity var(--rail-fade-motion),
        transform var(--rail-motion),
        border-color var(--rail-fade-motion);
      will-change: transform, opacity;
    }

    .feed {
      width: 100%;
      max-width: 980px;
      padding: 50px clamp(34px, 5vw, 72px) 72px;
      margin: 0 auto;
      transition: padding var(--rail-motion);
    }

    .nav-stack,
    .rail-stack {
      display: grid;
      gap: 8px;
    }

    .left-rail .nav-stack {
      min-width: 192px;
      transition:
        opacity var(--rail-fade-motion),
        transform var(--rail-motion);
    }

    body.sidebar-collapsed .left-rail .nav-stack {
      opacity: 0;
      transform: translateX(-12px);
    }

    .rail-section {
      padding-bottom: 30px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--line);
    }

    .rail-section:last-child {
      border-bottom: 0;
    }

    .side-link {
      position: relative;
      display: flex;
      align-items: center;
      gap: 18px;
      min-height: 46px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 400;
      line-height: 1.2;
      text-decoration: none;
    }

    button.side-link {
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      text-align: left;
      cursor: pointer;
    }

    .side-link.active,
    .side-link:hover {
      color: var(--dark);
    }

    .side-link.active::before {
      position: absolute;
      top: 9px;
      bottom: 9px;
      left: -28px;
      width: 2px;
      background: var(--dark);
      content: "";
    }

    .side-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      color: inherit;
      font-size: 0;
    }

    .side-icon svg {
      width: 25px;
      height: 25px;
      stroke: currentColor;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .side-icon .outline-icon,
    .side-icon .selected-icon {
      display: block;
    }

    .side-icon .selected-icon {
      display: none;
    }

    .side-link.active .side-icon .outline-icon {
      display: none;
    }

    .side-link.active .side-icon .selected-icon {
      display: block;
    }

    .side-icon .selected-fill {
      fill: currentColor;
      stroke: none;
    }

    .side-icon .selected-stroke {
      fill: none;
      stroke: currentColor;
    }

    .side-icon .selected-cut {
      fill: none;
      stroke: var(--white);
      stroke-width: 1.45;
    }

    @media (prefers-reduced-motion: reduce) {
      .side-icon.home-motion .home-roof,
      .side-icon.home-motion .home-walls,
      .side-icon.home-motion .home-sill,
      .side-icon.motion-icon .motion-trace,
      .side-icon.motion-icon .motion-scale,
      .side-icon.motion-icon .motion-pop {
        animation: none;
        stroke-dashoffset: 0;
        transform: none;
      }
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .stat-card {
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--white);
    }

    .stat-card strong {
      display: block;
      color: var(--dark);
      font-size: 20px;
      line-height: 1.2;
    }

    .stat-card span {
      color: var(--muted);
      font-size: 12px;
      max-width: 100%;
      overflow-wrap: anywhere;
      text-align: center;
    }

    .kicker {
      margin: 0 0 18px;
      color: var(--muted);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 18px;
      color: var(--dark);
      font-size: clamp(42px, 7vw, 66px);
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: 0;
    }

    h2 {
      margin: 0;
      color: var(--dark);
      font-size: 28px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 14px;
      color: var(--dark);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      font-size: 18px;
      line-height: 1.35;
    }

    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 22px;
      line-height: 1.55;
      font-style: italic;
    }

    .feed-head {
      padding-bottom: 0;
      border-bottom: 1px solid var(--line);
    }

    .feed-head h1 {
      max-width: 820px;
      font-size: clamp(44px, 6vw, 64px);
    }

    .feed-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 36px;
      margin-top: 0;
      border-bottom: 1px solid var(--line);
    }

    .tab-button {
      position: relative;
      padding: 0 0 14px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-family: var(--ui-font);
      font-size: 16px;
      cursor: pointer;
    }

    .tab-button.active {
      color: var(--dark);
    }

    .tab-button.active::after {
      position: absolute;
      right: 0;
      bottom: -1px;
      left: 0;
      height: 1px;
      background: var(--dark);
      content: "";
    }

    .filter-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      min-height: 36px;
      margin-top: 18px;
      color: var(--muted);
      font-family: var(--ui-font);
      font-size: 14px;
    }

    .feed-list {
      border-bottom: 1px solid var(--line);
    }

    .feed-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 184px;
      gap: 38px;
      max-width: none;
      margin: 0;
      padding: 38px 0;
      border-bottom: 1px solid var(--line);
    }

    .feed-card:last-child {
      border-bottom: 0;
    }

    .feed-card-main {
      color: inherit;
      text-decoration: none;
    }

    .feed-card h2 {
      margin-bottom: 8px;
      font-family: var(--ui-font);
      font-size: 28px;
      line-height: 1.18;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .feed-card p {
      margin: 0 0 14px;
      color: var(--muted);
      font-family: var(--ui-font);
      font-size: 17px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .feed-card:hover h2 {
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 5px;
    }

    .feed-cover {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      aspect-ratio: 4 / 3;
      margin-top: 28px;
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, transparent 0 49.5%, #dedede 50%, transparent 50.5%),
        linear-gradient(45deg, transparent 0 49.5%, #dedede 50%, transparent 50.5%),
        var(--soft);
      color: #8a8a8a;
      font-family: var(--ui-font);
      font-size: 13px;
      text-align: center;
      overflow: hidden;
    }

    .feed-cover .cover-text-overlay {
      position: absolute;
      inset: 0;
    }

    .feed-cover .cover-text-overlay .cto-title {
      font-size: 14px;
    }

    .feed-cover .cover-text-overlay .cto-byline {
      font-size: 11px;
      margin-top: 8px;
    }

    .mini-meta,
    .card-meta {
      color: var(--muted);
      font-family: var(--ui-font);
      font-size: 14px;
      line-height: 1.5;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      margin-bottom: 14px;
    }

    .story-author-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      color: var(--dark);
      font-family: var(--ui-font);
      font-size: 14px;
    }

    .small-avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--dark);
      color: var(--white);
      font-size: 12px;
      font-weight: 700;
    }

    .story-footer {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      color: var(--muted);
      font-family: var(--ui-font);
      font-size: 13px;
    }

    .story-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
      font-family: var(--ui-font);
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 18px;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 12px;
      border: 0;
      border-radius: 999px;
      background: var(--chip);
      color: var(--dark);
      font-family: var(--ui-font);
      font-size: 13px;
      text-decoration: none;
      cursor: pointer;
    }

    .tag-pill.active {
      background: var(--dark);
      color: var(--white);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      font-size: 12px;
    }

    .status-pill.dark {
      border-color: var(--dark);
      color: var(--dark);
    }

    a.status-pill {
      text-decoration: none;
    }

    .right-list {
      display: grid;
      gap: 18px;
    }

    .right-link {
      display: block;
      color: var(--dark);
      text-decoration: none;
    }

    .right-link strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
      line-height: 1.35;
    }

    .right-link span {
      color: var(--muted);
      font-size: 13px;
    }

    .author-box {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .avatar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--dark);
      color: var(--white);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      font-size: 18px;
      font-weight: 700;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 42px;
      color: var(--muted);
      font-family: Arial, "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    .author {
      color: var(--dark);
      font-weight: 600;
    }

    .cover {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      aspect-ratio: 16 / 9;
      margin: 0 0 48px;
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, transparent 0 49.5%, #dedede 50%, transparent 50.5%),
        linear-gradient(45deg, transparent 0 49.5%, #dedede 50%, transparent 50.5%),
        var(--soft);
      color: #8a8a8a;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      font-size: 15px;
      text-align: center;
      overflow: hidden;
    }

    .cover .cover-text-overlay {
      position: absolute;
      inset: 0;
    }

    .article-wrap {
      padding: 0 20px 72px;
      transition: padding var(--rail-motion);
    }

    .article-layout {
      display: grid;
      grid-template-columns: minmax(0, 680px) 240px;
      gap: 64px;
      justify-content: center;
      max-width: 1120px;
      margin: 0 auto;
    }

    .article-layout article {
      max-width: 680px;
      margin: 0;
    }

    .article-publication-bar {
      max-width: 1120px;
      margin: 0 auto 48px;
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
      color: var(--dark);
      font-family: var(--ui-font);
      font-size: 15px;
      font-weight: 700;
    }

    .article-publication-bar a {
      color: inherit;
      text-decoration: none;
    }

    .article-header {
      margin-bottom: 28px;
    }

    .article-header h1 {
      margin-bottom: 20px;
      font-family: var(--ui-font);
      font-size: 42px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .article-header .subtitle {
      margin-bottom: 28px;
      font-family: var(--ui-font);
      font-size: 22px;
      line-height: 1.45;
      font-style: normal;
    }

    .article-action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      min-height: 58px;
      margin: 24px 0 42px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-family: var(--ui-font);
    }

<body>
  <div class="progress-wrap" aria-hidden="true">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <header class="topbar">
    <button class="menu-button" id="menuButton" type="button" aria-label="Collapse sidebar" aria-expanded="true">
      <span aria-hidden="true"></span>
    </button>
    <a class="brand" id="brandLink" href="#/">一间小屋</a>
    <label class="search-box" for="globalSearch">
      <span aria-hidden="true">⌕</span>
      <input id="globalSearch" type="search" placeholder="Search">
    </label>
    <nav class="nav-actions" aria-label="Top navigation">
      <a class="nav-button write-link" href="#/write">
        <span class="nav-write-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="m4 20 4.2-1 10.9-10.9a2.1 2.1 0 0 0-3-3L5.2 16 4 20Z"></path><path d="m14.8 5.4 3.8 3.8"></path><path d="M12 20h8"></path></svg>
        </span>
        <span>Write</span>
      </a>
    </nav>
  </header>

  <main id="app" aria-live="polite"></main>
  <div class="toast" id="toast" role="status"></div>
  <div class="save-popover" id="savePopover" hidden></div>

  <script>
    const STORAGE_KEY = "suxie.posts.v1";
    const CLAP_KEY = "suxie.claps.v1";
    const LIBRARY_KEY = "suxie.library.v1";
    const STATS_KEY = "suxie.stats.v1";
    const STATIC_INDEX_URL = "posts/index.json";
    const SITE_CONFIG_URL = "site.config.json";
    const DEFAULT_SITE_CONFIG = {
      title: "一间小屋",
      tagline: "Personal Blog Platform",
      description: "A quiet, self-hosted personal writing room.",
      author: "Jiayi",
      bio: "Notes on writing, design, and self-hosted tools. Less noise, more durable text.",
      url: "",
      language: "en",
      locale: "en_US",
      rss: "feed.xml"
    };

    const DEFAULT_POSTS = [];
    const RETIRED_SAMPLE_POST_IDS = new Set(["slow-writing", "small-room", "draft-note"]);

    const app = document.getElementById("app");
    const progressBar = document.getElementById("progressBar");
    const toast = document.getElementById("toast");
    const savePopover = document.getElementById("savePopover");
    const globalSearch = document.getElementById("globalSearch");
    const brandLink = document.getElementById("brandLink");
    const menuButton = document.getElementById("menuButton");
    const state = {
      search: "",
      searchTab: "stories",
      tab: "all",
      tag: ""
    };
    const staticState = {
      posts: [],
      status: "loading",
      error: ""
    };
    let siteConfig = { ...DEFAULT_SITE_CONFIG };
    let toastTimer;
    let activeSavePostId = "";
    let editorSaveTimer;
    let editorSelectionHandler = null;
    let editorScrollHandler = null;
    let editorResizeHandler = null;
    let storyMenuCloseHandler = null;
    function setSidebarCollapsed(collapsed) {
      document.body.classList.toggle("sidebar-collapsed", collapsed);
      menuButton.setAttribute("aria-expanded", String(!collapsed));
      menuButton.setAttribute("aria-label", collapsed ? "Expand sidebar" : "Collapse sidebar");
      try { localStorage.setItem("suxie.sidebar.collapsed", collapsed ? "1" : "0"); } catch {}
    }

    (function restoreSidebarState() {
      try {
        if (localStorage.getItem("suxie.sidebar.collapsed") === "1") {
          document.body.classList.add("sidebar-collapsed");
          menuButton.setAttribute("aria-expanded", "false");
          menuButton.setAttribute("aria-label", "Expand sidebar");
        }
      } catch {}
    })();

    function absoluteSiteUrl(path = "") {
      const base = siteConfig.url || `${location.origin}${location.pathname.replace(/\/[^/]*$/, "/")}`;
      return new URL(path, base).toString();
    }

    function setMetaContent(selector, createAttrs, content) {
      let element = document.head.querySelector(selector);
      if (!element) {
        element = document.createElement("meta");
        Object.entries(createAttrs).forEach(([key, value]) => element.setAttribute(key, value));
        document.head.appendChild(element);
      }
      element.setAttribute("content", content);
    }

    function setNamedMeta(name, content) {
      setMetaContent(`meta[name="${name}"]`, { name }, content);
    }

    function setPropertyMeta(property, content) {
      setMetaContent(`meta[property="${property}"]`, { property }, content);
    }

    function setRssLink() {
      let link = document.head.querySelector('link[rel="alternate"][type="application/rss+xml"]');
      if (!link) {
        link = document.createElement("link");
        link.setAttribute("rel", "alternate");
        link.setAttribute("type", "application/rss+xml");
        document.head.appendChild(link);
      }
      link.setAttribute("title", `${siteConfig.title} RSS`);
      link.setAttribute("href", siteConfig.rss || "feed.xml");
    }

    function applySeo(page = {}) {
      const pageTitle = page.title ? `${page.title} | ${siteConfig.title}` : `${siteConfig.title} | ${siteConfig.tagline}`;
      const description = page.description || siteConfig.description;
      const hash = page.hash || location.hash || "#/";
      const url = absoluteSiteUrl(`index.html${hash}`);
      document.title = pageTitle;
      document.documentElement.lang = siteConfig.language || "zh-CN";
      setNamedMeta("description", description);
      setPropertyMeta("og:title", pageTitle);
      setPropertyMeta("og:description", description);
      setPropertyMeta("og:type", page.type || "website");
      setPropertyMeta("og:url", url);
      setPropertyMeta("og:locale", siteConfig.locale || "zh_CN");
      setNamedMeta("twitter:card", "summary");
      setNamedMeta("twitter:title", pageTitle);
      setNamedMeta("twitter:description", description);
      setRssLink();
      brandLink.textContent = siteConfig.title;
    }

    async function loadSiteConfig() {
      try {
        const response = await fetch(`${SITE_CONFIG_URL}?v=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) {
          applySeo();
          return;
        }
        const config = await response.json();
        siteConfig = { ...DEFAULT_SITE_CONFIG, ...config };
      } catch {
        siteConfig = { ...DEFAULT_SITE_CONFIG };
      }
      applySeo();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function slugify(value) {
      const asciiSlug = value
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return asciiSlug || `post-${Date.now()}`;
    }

    function parseTags(value) {
      if (Array.isArray(value)) {
        return value.map(item => String(item).trim()).filter(Boolean);
      }
      return String(value || "")
        .split(/[,，、\n]/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    function getMarkdownSource(post) {
      if (typeof post.markdown === "string") {
        return post.markdown;
      }
      if (Array.isArray(post.body)) {
        return post.body.join("\n\n");
      }
      return String(post.body || "");
    }

    function parseFrontMatter(markdown) {
      const source = String(markdown || "");
      if (!source.startsWith("---\n")) {
        return { data: {}, body: source };
      }
      const end = source.indexOf("\n---", 4);
      if (end === -1) {
        return { data: {}, body: source };
      }

      const raw = source.slice(4, end).trim();
      const body = source.slice(end + 4).trimStart();
      const data = {};
      raw.split("\n").forEach(line => {
        const index = line.indexOf(":");
        if (index === -1) {
          return;
        }
        const key = line.slice(0, index).trim();
        const value = line.slice(index + 1).trim();
        if (!key) {
          return;
        }
        if (value === "true" || value === "false") {
          data[key] = value === "true";
        } else if (value.includes(",")) {
          data[key] = value.split(",").map(item => item.trim()).filter(Boolean);
        } else {
          data[key] = value.replace(/^["']|["']$/g, "");
        }
      });
      return { data, body };
    }

    function normalizePost(post) {
      const frontMatter = parseFrontMatter(getMarkdownSource(post));
      const mergedPost = { ...post, ...frontMatter.data };
      const markdown = frontMatter.body.trim();
      const body = markdown.split(/\n\s*\n/);
      const presets = {
        "slow-writing": {
          tags: ["Essay", "Writing", "Personal site"],
          featured: true
        },
        "small-room": {
          tags: ["Self-hosted", "Personal site"],
          featured: false
        },
        "draft-note": {
          tags: ["Draft", "Planning"],
          featured: false,
          status: "draft"
        }
      };
      const preset = presets[mergedPost.id] || {};
      const tags = parseTags(mergedPost.tags);
      const status = ["draft", "scheduled", "published"].includes(mergedPost.status)
        ? mergedPost.status
        : (preset.status === "draft" ? "draft" : "published");

      return {
        id: mergedPost.id || slugify(mergedPost.title || "untitled"),
        title: mergedPost.title || "Untitled story",
        subtitle: mergedPost.subtitle || "",
        author: mergedPost.author || "Author",
        date: mergedPost.date || new Date().toLocaleDateString("zh-CN", {
          year: "numeric",
          month: "long",
          day: "numeric"
        }),
        minutes: mergedPost.minutes || "3",
        cover: mergedPost.cover || "Cover placeholder",
        quote: mergedPost.quote || "",
        tags: tags.length ? tags : (preset.tags || []),
        status,
        scheduledAt: mergedPost.scheduledAt || "",
        featured: mergedPost.featured === true || mergedPost.featured === "true" || preset.featured === true,
        source: mergedPost.source === "static" ? "static" : "local",
        file: mergedPost.file || "",
        markdown,
        body: body.map(item => String(item).trim()).filter(Boolean)
      };
    }

    function safeUrl(value) {
      const url = String(value || "").trim();
      if (!url || /^javascript:/i.test(url)) {
        return "#";
      }
      return url;
    }

    function renderInlineMarkdown(text) {
      let html = escapeHtml(text);
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, url) => {
        const href = escapeHtml(safeUrl(url));
        return `<a href="${href}" target="_blank" rel="noopener">${label}</a>`;
      });
      return html;
    }

    function getMarkdownHeadings(markdown) {
      const headings = [];
      markdown.replace(/\r\n/g, "\n").split("\n").forEach(line => {
        const match = line.match(/^(#{1,4})\s+(.+)$/);
        if (!match) {
          return;
        }
        const text = match[2].replace(/[#\s]+$/g, "").trim();
        if (!text) {
          return;
        }
        const level = Math.min(4, Math.max(2, match[1].length));
        headings.push({
          id: `${slugify(text)}-${headings.length + 1}`,
          level,
          text
        });
      });
      return headings;
    }

    function renderToc(headings) {
      if (!headings.length) {
        return "";
      }
      return `
        <aside class="toc" aria-label="Table of contents">
          <h3>Contents</h3>
          ${headings.map(heading => `
            <a class="level-${heading.level}" href="#${escapeHtml(heading.id)}">${escapeHtml(heading.text)}</a>
          `).join("")}
        </aside>
      `;
    }

    function renderMarkdown(markdown, legacyQuote = "") {
      const headings = getMarkdownHeadings(markdown);
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let paragraph = [];
      let listType = "";
      let listItems = [];
      let quoteLines = [];
      let inCode = false;
      let codeLines = [];
      let headingIndex = 0;
      let paragraphCount = 0;
      let legacyQuoteInserted = false;

      function flushParagraph() {
        if (!paragraph.length) {
          return;
        }
        html.push(`<p>${renderInlineMarkdown(paragraph.join(" "))}</p>`);
        paragraph = [];
        paragraphCount += 1;
        if (legacyQuote && !legacyQuoteInserted && paragraphCount === 2) {
          html.push(`<blockquote>${escapeHtml(legacyQuote)}</blockquote>`);
          legacyQuoteInserted = true;
        }
      }

      function flushList() {
        if (!listItems.length) {
          return;
        }
        html.push(`<${listType}>${listItems.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</${listType}>`);
        listType = "";
        listItems = [];
      }

      function flushQuote() {
        if (!quoteLines.length) {
          return;
        }
        html.push(`<blockquote>${renderInlineMarkdown(quoteLines.join(" "))}</blockquote>`);
        quoteLines = [];
      }

      function flushLooseBlocks() {
        flushParagraph();
        flushList();
        flushQuote();
      }

      lines.forEach(line => {
        const trimmed = line.trim();
        const fence = trimmed.match(/^```(.*)$/);
        if (fence) {
          if (inCode) {
            html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
            codeLines = [];
            inCode = false;
          } else {
            flushLooseBlocks();
            inCode = true;
          }
          return;
        }

        if (inCode) {
          codeLines.push(line);
          return;
        }

        if (!trimmed) {
          flushLooseBlocks();
          return;
        }

        const heading = trimmed.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          flushLooseBlocks();
          const text = heading[2].replace(/[#\s]+$/g, "").trim();
          const level = Math.min(4, Math.max(2, heading[1].length));
          const id = headings[headingIndex]?.id || `${slugify(text)}-${headingIndex + 1}`;
          headingIndex += 1;
          html.push(`<h${level} id="${escapeHtml(id)}">${renderInlineMarkdown(text)}</h${level}>`);
          return;
        }

        const image = trimmed.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
        if (image) {
          flushLooseBlocks();
          const alt = escapeHtml(image[1]);
          const src = escapeHtml(safeUrl(image[2]));
          html.push(`<figure><img src="${src}" alt="${alt}" loading="lazy">${alt ? `<figcaption>${alt}</figcaption>` : ""}</figure>`);
          return;
        }

        const video = trimmed.match(/^<video\s+[^>]*src=["']([^"']+)["'][^>]*><\/video>$/i);
        if (video) {
          flushLooseBlocks();
          const src = escapeHtml(safeUrl(video[1]));
          html.push(`<figure><video controls src="${src}"></video></figure>`);
          return;
        }

        const quote = trimmed.match(/^>\s?(.*)$/);
        if (quote) {
          flushParagraph();
          flushList();
          quoteLines.push(quote[1]);
          return;
        }

        const unordered = trimmed.match(/^[-*]\s+(.+)$/);
        const ordered = trimmed.match(/^\d+\.\s+(.+)$/);
        if (unordered || ordered) {
          flushParagraph();
          flushQuote();
          const nextType = unordered ? "ul" : "ol";
          if (listType && listType !== nextType) {
            flushList();
          }
          listType = nextType;
          listItems.push(unordered ? unordered[1] : ordered[1]);
          return;
        }

        flushList();
        flushQuote();
        paragraph.push(trimmed);
      });

      if (inCode) {
        html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
      }
      flushLooseBlocks();
      if (legacyQuote && !legacyQuoteInserted) {
        html.push(`<blockquote>${escapeHtml(legacyQuote)}</blockquote>`);
      }
      return html.join("");
    }

    function getLocalPosts() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) {
        return DEFAULT_POSTS.map(normalizePost);
      }

      try {
        const parsed = JSON.parse(saved);
        if (!Array.isArray(parsed)) {
          return DEFAULT_POSTS.map(normalizePost);
        }
        const cleaned = parsed.filter(post => !RETIRED_SAMPLE_POST_IDS.has(post?.id));
        if (cleaned.length !== parsed.length) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(cleaned));
        }
        return cleaned.map(normalizePost);
      } catch {
        return DEFAULT_POSTS.map(normalizePost);
      }
    }

    function getPosts() {
      const localPosts = getLocalPosts();
      const localIds = new Set(localPosts.map(post => post.id));
      const staticPosts = staticState.posts.filter(post => !localIds.has(post.id));
      return [...localPosts, ...staticPosts];
    }

    function savePosts(posts) {
      const localPosts = posts
        .map(normalizePost)
        .filter(post => post.source !== "static")
        .map(post => ({ ...post, source: "local", file: "" }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(localPosts));
    }

    async function loadStaticPosts() {
      try {
        const indexResponse = await fetch(`${STATIC_INDEX_URL}?v=${Date.now()}`, { cache: "no-store" });
        if (!indexResponse.ok) {
          staticState.status = "missing";
          return;
        }

        const entries = await indexResponse.json();
        if (!Array.isArray(entries)) {
          throw new Error("posts/index.json must be an array");
        }

        const loaded = [];
        for (const entry of entries) {
          if (!entry.file) {
            continue;
          }
          const markdownResponse = await fetch(`${entry.file}?v=${Date.now()}`, { cache: "no-store" });
          if (!markdownResponse.ok) {
            continue;
          }
          const markdown = await markdownResponse.text();
          loaded.push(normalizePost({
            ...entry,
            markdown,
            source: "static"
          }));
        }

        staticState.posts = loaded;
        staticState.status = "loaded";
      } catch (error) {
        staticState.status = "error";
        staticState.error = error.message || "Failed to load static stories";
      }
    }

    function getClaps() {
      try {
        return JSON.parse(localStorage.getItem(CLAP_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveClaps(claps) {
      localStorage.setItem(CLAP_KEY, JSON.stringify(claps));
    }

    function getReaderStats() {
      const fallback = { daily: {}, startedAt: new Date().toISOString() };
      try {
        const parsed = JSON.parse(localStorage.getItem(STATS_KEY));
        if (!parsed || typeof parsed !== "object" || !parsed.daily) {
          localStorage.setItem(STATS_KEY, JSON.stringify(fallback));
          return fallback;
        }
        return {
          startedAt: parsed.startedAt || fallback.startedAt,
          daily: parsed.daily || {}
        };
      } catch {
        localStorage.setItem(STATS_KEY, JSON.stringify(fallback));
        return fallback;
      }
    }

    function saveReaderStats(stats) {
      localStorage.setItem(STATS_KEY, JSON.stringify(stats));
    }

    function getDateKey(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function trackPostRead(post) {
      if (!post || post.status !== "published") {
        return;
      }
      const stats = getReaderStats();
      const key = getDateKey();
      const day = stats.daily[key] || { views: 0, reads: 0 };
      stats.daily[key] = {
        views: Number(day.views || 0) + 1,
        reads: Number(day.reads || 0) + 1
      };
      saveReaderStats(stats);
    }

    function getLibrary() {
      const fallback = {
        lists: [
          { id: "reading-list", name: "Reading list", postIds: [] }
        ]
      };
      try {
        const parsed = JSON.parse(localStorage.getItem(LIBRARY_KEY));
        if (!parsed || !Array.isArray(parsed.lists)) {
          localStorage.setItem(LIBRARY_KEY, JSON.stringify(fallback));
          return fallback;
        }
        const hasReadingList = parsed.lists.some(list => list.id === "reading-list");
        return hasReadingList ? parsed : { lists: [...fallback.lists, ...parsed.lists] };
      } catch {
        localStorage.setItem(LIBRARY_KEY, JSON.stringify(fallback));
        return fallback;
      }
    }

    function saveLibrary(library) {
      localStorage.setItem(LIBRARY_KEY, JSON.stringify(library));
    }

    function isPostSaved(postId, listId = "reading-list") {
      const list = getLibrary().lists.find(item => item.id === listId);
      return Boolean(list?.postIds.includes(postId));
    }

    function togglePostInList(postId, listId) {
      const library = getLibrary();
      const lists = library.lists.map(list => {
        if (list.id !== listId) {
          return list;
        }
        const exists = list.postIds.includes(postId);
        return {
          ...list,
          postIds: exists ? list.postIds.filter(id => id !== postId) : [...list.postIds, postId]
        };
      });
      saveLibrary({ lists });
      return lists.find(list => list.id === listId)?.postIds.includes(postId);
    }

    function createLibraryList(name) {
      const library = getLibrary();
      const id = slugify(name);
      const uniqueId = library.lists.some(list => list.id === id) ? `${id}-${Date.now()}` : id;
      const next = { lists: [...library.lists, { id: uniqueId, name, postIds: [] }] };
      saveLibrary(next);
      return uniqueId;
    }

    function renderSaveButton(postId, compact = false) {
      const saved = isPostSaved(postId);
      return `
        <button class="${compact ? "article-icon-action" : "button ghost"}" type="button" data-save-id="${escapeHtml(postId)}" aria-pressed="${saved}">
          ${saved ? "Saved" : "Save"}
        </button>
      `;
    }

    function renderSavePopover(postId) {
      activeSavePostId = postId;
      const library = getLibrary();
      savePopover.innerHTML = `
        ${library.lists.map(list => {
          const saved = list.postIds.includes(postId);
          return `
            <button class="save-list-row" type="button" data-save-list="${escapeHtml(list.id)}">
              <strong>${escapeHtml(list.name)}</strong>
              <span>${saved ? "✓" : "+"}</span>
            </button>
          `;
        }).join("")}
        <button class="save-create" type="button" id="createListButton">Create new list</button>
      `;
      savePopover.hidden = false;
      bindSavePopoverEvents();
    }

    function bindSavePopoverEvents() {
      savePopover.querySelectorAll("[data-save-list]").forEach(button => {
        button.addEventListener("click", () => {
          const saved = togglePostInList(activeSavePostId, button.dataset.saveList);
          showToast(saved ? "Saved to list" : "Removed from list");
          savePopover.hidden = true;
          if (location.hash === "#/library") {
            route();
          } else {
            updateSaveButtons(activeSavePostId);
          }
        });
      });

      savePopover.querySelector("#createListButton")?.addEventListener("click", () => {
        const name = prompt("List name", "New list");
        if (!name || !name.trim()) {
          return;
        }
        const listId = createLibraryList(name.trim());
        togglePostInList(activeSavePostId, listId);
        showToast("New list created and story saved");
        savePopover.hidden = true;
        if (location.hash === "#/library") {
          route();
        } else {
          updateSaveButtons(activeSavePostId);
        }
      });
    }

    function updateSaveButtons(postId) {
      document.querySelectorAll("[data-save-id]").forEach(button => {
        if (button.dataset.saveId !== postId) {
          return;
        }
        const saved = isPostSaved(postId);
        button.setAttribute("aria-pressed", String(saved));
        button.setAttribute("aria-label", saved ? "Saved" : "Save");
        if (button.hasAttribute("data-save-icon")) {
          button.innerHTML = articleActionIcon(saved ? "saved" : "save");
        } else {
          button.textContent = saved ? "Saved" : "Save";
        }
      });
    }

    function bindSaveButtons() {
      document.querySelectorAll("[data-save-id]").forEach(button => {
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          renderSavePopover(button.dataset.saveId);
        });
      });
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function updateProgress() {
      const scrollTop = window.scrollY || document.documentElement.scrollTop;
      const scrollable = document.documentElement.scrollHeight - window.innerHeight;
      const progress = scrollable > 0 ? (scrollTop / scrollable) * 100 : 0;
      progressBar.style.width = `${Math.min(progress, 100)}%`;
    }

    function getAllTags(posts) {
      return [...new Set(posts.flatMap(post => post.tags))].sort((a, b) => a.localeCompare(b, "zh-CN"));
    }

    function postMatchesSearch(post, query) {
      if (!query) {
        return true;
      }
      const haystack = [
        post.title,
        post.subtitle,
        post.author,
        post.date,
        post.quote,
        post.cover,
        post.tags.join(" "),
        post.markdown,
        post.body.join(" ")
      ].join(" ").toLowerCase();
      return haystack.includes(query.toLowerCase());
    }

    function getHashParams(hash = location.hash) {
      const index = hash.indexOf("?");
      return new URLSearchParams(index === -1 ? "" : hash.slice(index + 1));
    }

    function searchHash(query, type = "stories") {
      const params = new URLSearchParams();
      const trimmed = String(query || "").trim();
      if (trimmed) {
        params.set("q", trimmed);
      }
      if (type === "tags") {
        params.set("type", "tags");
      }
      const suffix = params.toString();
      return suffix ? `#/search?${suffix}` : "#/search";
    }

    function tagHash(tag) {
      return `#/tag/${encodeURIComponent(tag)}`;
    }

    function getFilteredPosts(posts) {
      return posts.filter(post => {
        const tabMatch =
          (state.tab === "all" && post.status === "published") ||
          (state.tab === "featured" && post.featured && post.status === "published") ||
          (state.tab === "latest" && post.status === "published") ||
          (state.tab === "draft" && post.status === "draft");
        const tagMatch = !state.tag || post.tags.includes(state.tag);
        return tabMatch && tagMatch && postMatchesSearch(post, state.search);
      });
    }

    function getStats(posts) {
      const claps = getClaps();
      return {
        total: posts.length,
        published: posts.filter(post => post.status === "published").length,
        scheduled: posts.filter(post => post.status === "scheduled").length,
        draft: posts.filter(post => post.status === "draft").length,
        featured: posts.filter(post => post.featured).length,
        claps: Object.values(claps).reduce((sum, value) => sum + Number(value || 0), 0)
      };
    }

    function getStoryStatusLabel(status) {
      if (status === "scheduled") {
        return "Scheduled";
      }
      if (status === "draft") {
        return "Draft";
      }
      return "Published";
    }

    function formatScheduleTime(value) {
      if (!value) {
        return "";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
    }

    function getStoryFreshness(post) {
      if (post.status === "published") {
        return "Published just now ·";
      }
      if (post.status === "scheduled") {
        return "Scheduled ·";
      }
      return "Draft ·";
    }

    function renderStoryThumb(post) {
      const rawCover = String(post.cover || "").trim();
      const cover = safeUrl(rawCover);
      if (/^__text_cover__:/i.test(rawCover)) {
        return `<span class="story-row-thumb">${escapeHtml(post.title || "Text cover")}</span>`;
      }
      if (/^data:image\//i.test(cover) || (/^(https?:\/\/|assets\/|\.\/|\/)/.test(cover) && /\.(png|jpe?g|gif|webp|svg)$/i.test(cover))) {
        return `<span class="story-row-thumb"><img src="${escapeHtml(cover)}" alt=""></span>`;
      }
      return `<span class="story-row-thumb">${escapeHtml(rawCover || "Cover")}</span>`;
    }

    function renderTags(tags, activeTag = "") {
      if (!tags.length) {
        return "";
      }
      return `
        <div class="tag-row">
          ${tags.map(tag => `
            <button class="tag-pill ${activeTag === tag ? "active" : ""}" type="button" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</button>
          `).join("")}
        </div>
      `;
    }

    function renderMeta(post) {
      const initial = escapeHtml(post.author.slice(0, 1) || "A");
      return `
        <div class="meta">
          <div class="avatar" aria-hidden="true">${initial}</div>
          <div>
            <div><span class="author">${escapeHtml(post.author)}</span></div>
            <div>${escapeHtml(post.date)} · ${escapeHtml(post.minutes)} min read</div>
          </div>
        </div>
      `;
    }

    // Returns inner HTML for a .cover or .feed-cover element based on the cover field value
    function renderCoverInner(post, context = "article") {
      const cover = String(post.cover || "");
      // Text cover generated at publish time
      if (cover.startsWith("__text_cover__:")) {
        const titleText = cover.slice("__text_cover__:".length) || post.title;
        return `<div class="cover-text-overlay" aria-hidden="true">
          <div class="cto-title">${escapeHtml(titleText)}</div>
          <div class="cto-byline">${escapeHtml(post.author)}</div>
        </div>`;
      }
      // Real image URL
      if (/^(https?:\/\/|data:|assets\/|\/)/.test(cover)) {
        return `<img src="${escapeHtml(cover)}" alt="${escapeHtml(post.title)}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
      }
      // Fallback placeholder text
      if (context === "feed") {
        return escapeHtml(cover || "");
      }
      return `<span style="color:var(--muted);font-size:15px;">${escapeHtml(cover || "Cover placeholder")}</span>`;
    }

    function renderEditableBlocks(markdown) {
      const source = String(markdown || "").trim();
      if (!source) {
        return "";
      }
      return source
        .split(/\n\s*\n/)
        .map(block => {
          const text = block.trim();
          const imageMatch = text.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
          if (imageMatch) {
            const alt = imageMatch[1] || "Image";
            const src = escapeHtml(safeUrl(imageMatch[2]));
            return `<figure data-media-type="image"><img src="${src}" alt="${escapeHtml(alt)}"><figcaption>${escapeHtml(alt)}</figcaption></figure>`;
          }
          const videoMatch = text.match(/^<video[^>]*src=["']([^"']+)["'][^>]*><\/video>$/i);
          if (videoMatch) {
            const src = escapeHtml(safeUrl(videoMatch[1]));
            return `<figure data-media-type="video"><video controls src="${src}"></video><figcaption>Video</figcaption></figure>`;
          }
          if (/^###\s+/.test(text)) {
            return `<h3>${renderInlineMarkdown(text.replace(/^###\s+/, ""))}</h3>`;
          }
          if (/^##\s+/.test(text)) {
            return `<h2>${renderInlineMarkdown(text.replace(/^##\s+/, ""))}</h2>`;
          }
          if (/^>\s+/.test(text)) {
            return `<blockquote>${renderInlineMarkdown(text.replace(/^>\s+/, ""))}</blockquote>`;
          }
          return `<p>${renderInlineMarkdown(text.replace(/\n/g, " "))}</p>`;
        })
        .join("");
    }

    function getEditableText(element) {
      return String(element?.innerText || "")
        .replace(/\u00a0/g, " ")
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean)
        .join("\n\n");
    }

    function estimateMinutes(markdown) {
      const text = String(markdown || "").trim();
      if (!text) {
        return "1";
      }
      const chineseChars = (text.match(/[\u4e00-\u9fa5]/g) || []).length;
      const words = text
        .replace(/[\u4e00-\u9fa5]/g, " ")
        .split(/\s+/)
        .filter(Boolean).length;
      return String(Math.max(1, Math.ceil((chineseChars + words) / 450)));
    }

    function serializeInlineMarkdown(node) {
      if (!node) {
        return "";
      }
      if (node.nodeType === Node.TEXT_NODE) {
        return node.textContent || "";
      }
      if (node.nodeType !== Node.ELEMENT_NODE) {
        return "";
      }
      const tag = node.tagName.toLowerCase();
      const content = Array.from(node.childNodes).map(serializeInlineMarkdown).join("");
      if (tag === "strong" || tag === "b") {
        return `**${content}**`;
      }
      if (tag === "em" || tag === "i") {
        return `*${content}*`;
      }
      if (tag === "a") {
        return `[${content}](${node.getAttribute("href") || "#"})`;
      }
      if (tag === "br") {
        return "\n";
      }
      return content;
    }

    function getEditableMarkdown(element) {
      if (!element) {
        return "";
      }
      return Array.from(element.childNodes)
        .map(node => {
          if (node.nodeType === Node.TEXT_NODE) {
            return node.textContent.trim();
          }
          if (node.nodeType !== Node.ELEMENT_NODE) {
            return "";
          }
          const tag = node.tagName.toLowerCase();
          const content = serializeInlineMarkdown(node).trim();
          if (!content) {
            return "";
          }
          if (tag === "h2") {
            return `## ${content}`;
          }
          if (tag === "h3") {
            return `### ${content}`;
          }
          if (tag === "blockquote") {
            return `> ${content}`;
          }
          if (tag === "ul" || tag === "ol") {
            return Array.from(node.querySelectorAll("li"))
              .map(item => `- ${serializeInlineMarkdown(item).trim()}`)
              .join("\n");
          }
          if (tag === "figure") {
            const image = node.querySelector("img");
            const video = node.querySelector("video");
            const caption = node.querySelector("figcaption")?.textContent?.trim() || "";
            if (image) {
              return `![${caption || image.getAttribute("alt") || "Image"}](${image.getAttribute("src") || ""})`;
            }
            if (video) {
              return `<video controls src="${video.getAttribute("src") || ""}"></video>`;
            }
          }
          return content;
        })
        .map(block => block.trim())
        .filter(Boolean)
        .join("\n\n");
    }

    function countSelectionWords(text) {
      const source = String(text || "").trim();
      if (!source) {
        return 0;
      }
      const chineseChars = (source.match(/[\u4e00-\u9fa5]/g) || []).length;
      const latinWords = source
        .replace(/[\u4e00-\u9fa5]/g, " ")
        .split(/\s+/)
        .filter(Boolean).length;
      return chineseChars + latinWords;
    }

    function updateLocalPost(id, updater) {
      let updated = null;
      const nextPosts = getLocalPosts().map(post => {
        if (post.id !== id) {
          return post;
        }
        updated = normalizePost(updater(post));
        return updated;
      });
      if (!updated) {
        return null;
      }
      savePosts(nextPosts);
      return updated;
    }

    function deleteLocalPost(id) {
      const nextPosts = getLocalPosts().filter(post => post.id !== id);
      savePosts(nextPosts);
      const claps = getClaps();
      delete claps[id];
      saveClaps(claps);
      const library = getLibrary();
      saveLibrary({
        lists: library.lists.map(list => ({
          ...list,
          postIds: list.postIds.filter(postId => postId !== id)
        }))
      });
    }

    async function sharePost(id) {
      const url = `${location.origin}${location.pathname}#/post/${encodeURIComponent(id)}`;
      try {
        await navigator.clipboard.writeText(url);
        showToast("Story link copied");
      } catch {
        showToast(url);
      }
    }

    async function shareStory(id) {
      const post = getPosts().find(item => item.id === id);
      const url = `${location.origin}${location.pathname}#/post/${encodeURIComponent(id)}`;
      if (navigator.share && post) {
        try {
          await navigator.share({
            title: post.title,
            text: post.subtitle || post.title,
            url
          });
          return;
        } catch (error) {
          if (error?.name === "AbortError") {
            return;
          }
        }
      }
      await sharePost(id);
    }

    function getStatsMonthModel() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const today = now.getDate();
      const monthLabel = new Intl.DateTimeFormat("en-US", { month: "long", year: "numeric" }).format(now);
      const shortMonth = new Intl.DateTimeFormat("en-US", { month: "short" }).format(now);
      const readerStats = getReaderStats();
      const days = Array.from({ length: today }, (_, index) => {
        const date = new Date(year, month, index + 1);
        const key = getDateKey(date);
        const day = readerStats.daily[key] || { views: 0, reads: 0 };
        return {
          day: index + 1,
          key,
          label: `${shortMonth} ${index + 1}, ${year}`,
          axisLabel: `${shortMonth} ${index + 1}`,
          views: Number(day.views || 0),
          reads: Number(day.reads || 0)
        };
      });
      return { now, year, month, today, monthLabel, shortMonth, days, readerStats };
    }

    function renderStatsChart(days) {
      const width = 960;
      const height = 320;
      const left = 42;
      const right = 18;
      const top = 18;
      const bottom = 284;
      const chartWidth = width - left - right;
      const chartHeight = bottom - top;
      const maxValue = Math.max(1, ...days.flatMap(day => [day.views, day.reads]));
      const xFor = index => left + (days.length <= 1 ? 0 : (index / (days.length - 1)) * chartWidth);
      const yFor = value => bottom - (Number(value || 0) / maxValue) * chartHeight;
      const viewsPoints = days.map((day, index) => `${xFor(index)},${yFor(day.views)}`).join(" ");
      const readsPoints = days.map((day, index) => `${xFor(index)},${yFor(day.reads)}`).join(" ");
      const gridCount = Math.min(Math.max(days.length, 2), 13);
      const gridLines = Array.from({ length: gridCount }, (_, index) => {
        const x = left + (index / Math.max(1, gridCount - 1)) * chartWidth;
        return `<line x1="${x}" y1="${top}" x2="${x}" y2="${bottom}" stroke="#e8e8e8" stroke-width="1"></line>`;
      }).join("");
      const hitPoints = days.map((day, index) => {
        const x = xFor(index);
        const y = yFor(day.reads);
        return `
          <circle class="stats-hit" cx="${x}" cy="${y}" r="13" fill="transparent"
            data-stats-point
            data-x="${x}"
            data-y="${y}"
            data-date="${escapeHtml(day.label)}"
            data-views="${day.views}"
            data-reads="${day.reads}"></circle>
        `;
      }).join("");
      const midIndex = Math.min(days.length - 1, 7);
      const midLabel = days[midIndex]?.axisLabel || "";
      const firstLabel = days[0]?.axisLabel || "";
      return `
        <div class="stats-chart-wrap">
          <svg class="stats-chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="Monthly views and reads chart">
            <line x1="${left}" y1="${top}" x2="${width - right}" y2="${top}" stroke="#dcdcdc"></line>
            <line x1="${left}" y1="${top}" x2="${left}" y2="${bottom}" stroke="#222" stroke-width="1.2"></line>
            <line x1="${left}" y1="${bottom}" x2="${width - right}" y2="${bottom}" stroke="#222" stroke-width="1.2"></line>
            ${gridLines}
            <text x="${left - 20}" y="${top + 7}" class="stats-axis-label">${maxValue}</text>
            <text x="${left - 20}" y="${bottom + 5}" class="stats-axis-label">0</text>
            <text x="${left}" y="${bottom + 30}" class="stats-axis-label">${escapeHtml(firstLabel)}</text>
            ${midLabel ? `<text x="${xFor(midIndex)}" y="${bottom + 30}" text-anchor="middle" class="stats-axis-label">${escapeHtml(midLabel)}</text>` : ""}
            <polyline points="${viewsPoints}" fill="none" stroke="#b9dcbf" stroke-width="3"></polyline>
            <polyline points="${readsPoints}" fill="none" stroke="#167a24" stroke-width="3"></polyline>
            ${hitPoints}
          </svg>
          <div class="stats-tooltip" id="statsTooltip" hidden></div>
          <div class="stats-legend">
            <span><i class="legend-dot views"></i>Views</span>
            <span><i class="legend-dot"></i>Reads</span>
          </div>
        </div>
      `;
    }

    function renderPublishConfirm(id) {
      const post = getPosts().find(item => item.id === id);
      if (!post || post.source === "static") {
        location.hash = "#/manage";
        return;
      }
      const isScheduled = post.status === "scheduled";
      applySeo({
        title: "Publish story",
        description: "Confirm story preview, subtitle, and topics.",
        hash: `#/publish/${encodeURIComponent(id)}`
      });

      // Extract all images from markdown body
      const imgRegex = /!\[[^\]]*\]\(([^)]+)\)|<img[^>]+src=["']([^"']+)["']/g;
      const articleImages = [];
      let m;
      const src = post.markdown || post.body.join("\n\n");
      while ((m = imgRegex.exec(src)) !== null) {
        const url = m[1] || m[2];
        if (url && !articleImages.includes(url)) articleImages.push(url);
      }

      // Derive auto text-cover snippet: first ~80 chars of body text
      const bodyText = src.replace(/!\[[^\]]*\]\([^)]+\)/g, "").replace(/[#>*`_~\[\]]/g, "").replace(/\s+/g, " ").trim();
      const snippet = bodyText.slice(0, 80).trim() + (bodyText.length > 80 ? "…" : "");

      // Determine initial cover selection
      // 'auto' = generated text cover, 'none' = no cover, or an image URL
      const hasCoverUrl = post.cover && /^(https?:\/\/|data:|assets\/|\/)/.test(post.cover);
      let currentCover = hasCoverUrl ? post.cover : (articleImages.length === 0 ? "auto" : "none");

      function buildPickerHTML() {
        const autoSel = currentCover === "auto" ? "selected" : "";
        const noneSel = currentCover === "none" ? "selected" : "";
        let items = `<div class="cover-option-auto ${autoSel}" data-cover="auto">Text<br>cover</div>`;
        items += articleImages.map(url => {
          const sel = currentCover === url ? "selected" : "";
          return `<div class="cover-option ${sel}" data-cover="${escapeHtml(url)}"><img src="${escapeHtml(url)}" alt="" loading="lazy"></div>`;
        }).join("");
        items += `<div class="cover-option-none ${noneSel}" data-cover="none">No cover</div>`;
        return items;
      }

      function buildPreviewHTML(cover) {
        if (cover === "auto") {
          return `<div class="cover-text-overlay">
            <div class="cto-title">${escapeHtml(post.title)}</div>
            ${snippet ? `<div class="cto-byline">${escapeHtml(snippet)}</div>` : ""}
          </div>`;
        }
        if (cover === "none") {
          return `<span class="publish-cover-hint">No cover image selected</span>`;
        }
        return `<img class="cover-selected-img" src="${escapeHtml(cover)}" alt="Cover">`;
      }

      function compressDataImageCover(dataUrl) {
        if (!/^data:image\//i.test(String(dataUrl || ""))) {
          return Promise.resolve(dataUrl);
        }
        return new Promise(resolve => {
          const image = new Image();
          image.onload = () => {
            const maxWidth = 900;
            const maxHeight = 420;
            const ratio = Math.min(maxWidth / image.naturalWidth, maxHeight / image.naturalHeight, 1);
            const width = Math.max(1, Math.round(image.naturalWidth * ratio));
            const height = Math.max(1, Math.round(image.naturalHeight * ratio));
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const context = canvas.getContext("2d");
            if (!context) {
              resolve("");
              return;
            }
            context.drawImage(image, 0, 0, width, height);
            resolve(canvas.toDataURL("image/jpeg", 0.72));
          };
          image.onerror = () => resolve("");
          image.src = dataUrl;
        });
      }

      async function resolveCoverToSave(cover, titleForCover) {
        if (cover === "auto") {
          return `__text_cover__:${titleForCover}`;
        }
        if (cover === "none") {
          return "";
        }
        if (/^data:image\//i.test(String(cover || ""))) {
          const compressed = await compressDataImageCover(cover);
          return compressed || `__text_cover__:${titleForCover}`;
        }
        return cover;
      }

      const pickerLabel = articleImages.length > 0
        ? "Choose a cover — select an image from your story, or use a generated text cover"
        : "No images found in story — using generated text cover";

      app.innerHTML = `
        <section class="publish-page">
          <div class="publish-grid">
            <section>
              <h1>Story preview</h1>
              <div class="publish-preview-cover" id="coverPreview">${buildPreviewHTML(currentCover)}</div>
              <div class="cover-picker">
                <span class="cover-picker-label">${pickerLabel}</span>
                <div class="cover-picker-grid" id="coverPickerGrid">${buildPickerHTML()}</div>
              </div>
              <input class="publish-preview-field publish-preview-title" id="publishTitleInput" value="${escapeHtml(post.title)}" maxlength="100" aria-label="Story title">
              <div class="mini-meta"><span id="publishTitleCount">${post.title.length}</span>/100</div>
              <textarea class="publish-preview-field" id="publishSubtitleInput" rows="3" maxlength="140" aria-label="Story subtitle">${escapeHtml(post.subtitle)}</textarea>
              <div class="mini-meta"><span id="publishSubtitleCount">${post.subtitle.length}</span>/140</div>
              <p class="publish-note">Note: Changes here affect how your story appears on the homepage and lists, not the contents of the story itself.</p>
            </section>
            <aside>
              <section class="publish-side-section">
                <h2>Topics</h2>
                <p>Add up to five topics to help readers find your story.</p>
                <input class="publish-topic-input" id="publishTopicsInput" value="${escapeHtml(post.tags.join(", "))}" placeholder="Add a topic...">
              </section>
              <section class="publish-side-section">
                <h2>Publication</h2>
                <p>Publish this story to your personal site.</p>
                <div class="schedule-box">
                  <label class="schedule-toggle">
                    <input id="scheduleToggle" type="checkbox" ${isScheduled ? "checked" : ""}>
                    <span>Schedule to publish</span>
                  </label>
                  <input class="schedule-input" id="scheduleAtInput" type="datetime-local" step="1" value="${escapeHtml(post.scheduledAt || "")}" ${isScheduled ? "" : "disabled"} aria-label="Scheduled publish time">
                </div>
              </section>
              <div class="actions-row">
                <button class="button primary" id="confirmPublishButton" type="button">Publish</button>
                <a class="button ghost" href="#/write/${encodeURIComponent(post.id)}">Back to editor</a>
              </div>
            </aside>
          </div>
        </section>
      `;

      // Cover picker click handler
      document.getElementById("coverPickerGrid").addEventListener("click", e => {
        const option = e.target.closest("[data-cover]");
        if (!option) return;
        currentCover = option.dataset.cover;
        // Update selected state
        document.querySelectorAll("[data-cover]").forEach(el => el.classList.remove("selected"));
        option.classList.add("selected");
        // Update preview
        document.getElementById("coverPreview").innerHTML = buildPreviewHTML(currentCover);
      });

      const updateCounts = () => {
        document.getElementById("publishTitleCount").textContent = document.getElementById("publishTitleInput").value.length;
        document.getElementById("publishSubtitleCount").textContent = document.getElementById("publishSubtitleInput").value.length;
      };
      document.getElementById("publishTitleInput").addEventListener("input", updateCounts);
      document.getElementById("publishSubtitleInput").addEventListener("input", updateCounts);

      const scheduleToggle = document.getElementById("scheduleToggle");
      const scheduleAtInput = document.getElementById("scheduleAtInput");
      const confirmPublishButton = document.getElementById("confirmPublishButton");
      const updateScheduleControls = () => {
        scheduleAtInput.disabled = !scheduleToggle.checked;
        confirmPublishButton.textContent = scheduleToggle.checked ? "Schedule" : "Publish";
      };
      scheduleToggle.addEventListener("change", updateScheduleControls);
      updateScheduleControls();

      confirmPublishButton.addEventListener("click", async () => {
        const title = document.getElementById("publishTitleInput").value.trim() || post.title;
        const subtitle = document.getElementById("publishSubtitleInput").value.trim();
        const tags = parseTags(document.getElementById("publishTopicsInput").value).slice(0, 5);
        const scheduleToPublish = scheduleToggle.checked;
        const scheduledAt = scheduleAtInput.value.trim();
        if (scheduleToPublish && !scheduledAt) {
          showToast("Choose a scheduled publish date and time.");
          scheduleAtInput.focus();
          return;
        }
        confirmPublishButton.disabled = true;
        const publishUpdate = cover => updateLocalPost(post.id, current => ({
          ...current,
          title,
          subtitle,
          tags,
          cover,
          status: scheduleToPublish ? "scheduled" : "published",
          scheduledAt: scheduleToPublish ? scheduledAt : ""
        }));

        let updated = null;
        try {
          updated = publishUpdate(await resolveCoverToSave(currentCover, title));
        } catch (error) {
          if (error?.name === "QuotaExceededError" && /^data:image\//i.test(String(currentCover || ""))) {
            showToast("Cover image is too large. Using a text cover instead.");
            updated = publishUpdate(`__text_cover__:${title}`);
          } else {
            confirmPublishButton.disabled = false;
            showToast("Publish failed: browser storage is full.");
            return;
          }
        }
        confirmPublishButton.disabled = false;
        if (!updated) {
          showToast("Publish failed: story not found.");
          return;
        }
        if (scheduleToPublish) {
          showToast("Story scheduled.");
