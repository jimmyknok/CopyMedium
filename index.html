      const setSaveState = value => {
        const element = document.getElementById("editorSaveState");
        if (element) {
          element.textContent = value;
          element.hidden = false;
        }
      };

      const restoreEditorStatus = () => {
        const label = document.getElementById("editorStatusLabel");
        const saveState = document.getElementById("editorSaveState");
        if (label) {
          label.textContent = document.getElementById("postId").value && post.status === "published" ? "Published" : "Draft";
        }
        if (saveState) {
          saveState.hidden = false;
        }
      };

      const placeCaretAtStart = element => {
        if (!element) {
          return;
        }
        element.focus();
        const range = document.createRange();
        range.selectNodeContents(element);
        range.collapse(true);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      };

      const placeCaretAtEnd = element => {
        if (!element) {
          return;
        }
        element.focus();
        const range = document.createRange();
        range.selectNodeContents(element);
        range.collapse(false);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      };

      const isCaretAtStart = element => {
        const selection = window.getSelection();
        if (!selection || selection.rangeCount === 0 || !element.contains(selection.anchorNode)) {
          return false;
        }
        const range = selection.getRangeAt(0).cloneRange();
        range.selectNodeContents(element);
        range.setEnd(selection.anchorNode, selection.anchorOffset);
        return range.toString().length === 0;
      };

      const normalizeTitleLine = () => {
        const title = document.getElementById("titleInput");
        if (!title) {
          return;
        }
        const text = getEditableText(title).replace(/\s*\n+\s*/g, " ").trim();
        if (title.textContent !== text) {
          title.textContent = text;
          placeCaretAtEnd(title);
        }
      };

      const activateBodyLine = () => {
        const body = document.getElementById("bodyInput");
        if (!body) {
          return;
        }
        body.classList.remove("is-waiting");
        body.setAttribute("contenteditable", "true");
        if (!body.innerHTML.trim()) {
          body.innerHTML = "<p><br></p>";
        }
        placeCaretAtStart(body);
        updateLineMarker();
      };

      const getActiveEditorLine = () => {
        const active = document.activeElement;
        if (active?.id === "titleInput") {
          return "title";
        }
        if (active?.id === "bodyInput" || document.getElementById("bodyInput")?.contains(active)) {
          return "body";
        }
        return "";
      };

      const getActiveBodyBlock = () => {
        const body = document.getElementById("bodyInput");
        const selection = window.getSelection();
        if (!body || !selection || selection.rangeCount === 0 || !body.contains(selection.anchorNode)) {
          return null;
        }
        let node = selection.anchorNode;
        if (node.nodeType === Node.TEXT_NODE) {
          node = node.parentElement;
        }
        while (node && node !== body && node.parentElement !== body) {
          node = node.parentElement;
        }
        if (node === body) {
          return body.firstElementChild || body;
        }
        return node;
      };

      const isBlockEmpty = block => !getEditableText(block).trim() && !block?.querySelector?.("img, video, figure");

      const alignInsertRailToBlock = block => {
        const rail = document.querySelector(".editor-insert-rail");
        const row = document.querySelector(".editor-main-row");
        if (!rail || !row || !block) {
          return;
        }
        const rowTop = row.getBoundingClientRect().top;
        const blockTop = block.getBoundingClientRect().top;
        rail.style.paddingTop = `${Math.max(0, Math.round(blockTop - rowTop + 4))}px`;
      };

      const updateLineMarker = () => {
        const rail = document.querySelector(".editor-insert-rail");
        const plus = document.getElementById("editorPlusButton");
        const label = document.getElementById("editorLineLabel");
        const title = document.getElementById("titleInput");
        const body = document.getElementById("bodyInput");
        const activeLine = getActiveEditorLine();
        const titleText = getEditableText(title);
        const bodyText = getEditableMarkdown(body);
        const popover = document.getElementById("mediaInsertPopover");

        if (activeLine === "title") {
          if (rail) {
            rail.classList.add("is-title-marker");
            rail.style.paddingTop = "0px";
          }
          plus.hidden = true;
          plus.classList.remove("is-open");
          plus.setAttribute("aria-expanded", "false");
          if (popover) {
            popover.hidden = true;
          }
          label.hidden = false;
          return;
        }

        if (activeLine === "body") {
          label.hidden = true;
          rail?.classList.remove("is-title-marker");
          const activeBlock = getActiveBodyBlock();
          const showInsert = Boolean(activeBlock && isBlockEmpty(activeBlock));
          if (showInsert) {
            alignInsertRailToBlock(activeBlock);
          } else if (rail) {
            rail.style.paddingTop = "";
          }
          plus.hidden = !showInsert;
          if (!showInsert) {
            closeMediaPopover();
          }
          return;
        }

        if (rail) {
          rail.classList.remove("is-title-marker");
          rail.style.paddingTop = "";
        }
        plus.hidden = Boolean(titleText || bodyText);
        label.hidden = true;
      };

      const saveEditorPost = (statusOverride = "") => {
        const title = getEditableText(document.getElementById("titleInput"));
        const subtitle = getEditableText(document.getElementById("subtitleInput"));
        const markdown = getEditableMarkdown(document.getElementById("bodyInput"));
        if (!title && !markdown) {
          setSaveState("Draft");
          return null;
        }
        const existingId = document.getElementById("postId").value;
        const nextPost = normalizePost({
          id: existingId || slugify(title),
          title: title || "Untitled story",
          subtitle,
          author: document.getElementById("authorInput").value.trim(),
          date: post.date || new Date().toLocaleDateString("zh-CN", {
            year: "numeric",
            month: "long",
            day: "numeric"
          }),
          minutes: estimateMinutes(markdown),
          cover: document.getElementById("coverInput").value.trim(),
          quote: document.getElementById("quoteInput").value.trim(),
          tags: document.getElementById("tagsInput").value,
          status: statusOverride || post.status || "draft",
          featured: document.getElementById("featuredInput").checked,
          markdown
        });

        const currentPosts = getPosts();
        const index = currentPosts.findIndex(item => item.id === nextPost.id);
        if (index >= 0) {
          currentPosts[index] = nextPost;
        } else {
          currentPosts.unshift(nextPost);
        }

        savePosts(currentPosts);
        document.getElementById("postId").value = nextPost.id;
        document.getElementById("editorStatusLabel").textContent = nextPost.status === "published" ? "Published" : "Draft";
        return nextPost;
      };

      const editorContainsSelection = selection => {
        if (!selection || selection.rangeCount === 0 || selection.isCollapsed) {
          return false;
        }
        const stage = document.querySelector(".editor-stage");
        const range = selection.getRangeAt(0);
        return Boolean(stage?.contains(range.commonAncestorContainer));
      };

      const updateSelectionToolbar = () => {
        const toolbar = document.getElementById("selectionToolbar");
        const selection = window.getSelection();
        if (!toolbar || !editorContainsSelection(selection)) {
          toolbar.hidden = true;
          restoreEditorStatus();
          return;
        }

        const text = selection.toString().trim();
        const count = countSelectionWords(text);
        if (!count) {
          toolbar.hidden = true;
          restoreEditorStatus();
          return;
        }

        const range = selection.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        if (!rect || (!rect.width && !rect.height)) {
          toolbar.hidden = true;
          restoreEditorStatus();
          return;
        }

        const label = document.getElementById("editorStatusLabel");
        const saveState = document.getElementById("editorSaveState");
        if (label) {
          label.textContent = `${count} ${count === 1 ? "word" : "words"}`;
        }
        if (saveState) {
          saveState.hidden = true;
        }

        toolbar.hidden = false;
        const top = Math.max(78, rect.top - 14);
        const left = Math.min(window.innerWidth - 26, Math.max(26, rect.left + rect.width / 2));
        toolbar.style.top = `${top}px`;
        toolbar.style.left = `${left}px`;
      };

      const runFormatCommand = (button) => {
        const command = button.dataset.formatCommand;
        const block = button.dataset.formatBlock;
        if (command === "link") {
          const url = prompt("Paste or type a link");
          if (!url) {
            updateSelectionToolbar();
            return;
          }
          document.execCommand("createLink", false, url);
        } else if (command) {
          document.execCommand(command, false, null);
        } else if (block) {
          document.execCommand("formatBlock", false, block);
        }
        scheduleAutoSave();
        updateSelectionToolbar();
      };

      const positionMediaPopover = () => {
        const popover = document.getElementById("mediaInsertPopover");
        const plus = document.getElementById("editorPlusButton");
        if (!popover || !plus) {
          return;
        }
        const rect = plus.getBoundingClientRect();
        popover.style.left = `${Math.min(window.innerWidth - 150, rect.right + 16)}px`;
        popover.style.top = `${Math.max(70, rect.top + 1)}px`;
      };

      const closeMediaPopover = () => {
        const popover = document.getElementById("mediaInsertPopover");
        const plus = document.getElementById("editorPlusButton");
        if (popover) {
          popover.hidden = true;
        }
        if (plus) {
          plus.classList.remove("is-open");
          plus.setAttribute("aria-expanded", "false");
        }
      };

      const insertMediaBlock = (type, src, caption = "") => {
        if (!src || !String(src).trim()) {
          return;
        }
        const body = document.getElementById("bodyInput");
        if (!body) {
          return;
        }
        const figure = document.createElement("figure");
        figure.setAttribute("data-media-type", type);
        figure.setAttribute("contenteditable", "false");
        if (type === "image") {
          const image = document.createElement("img");
          image.src = safeUrl(String(src).trim());
          image.alt = caption.trim() || "Image";
          figure.appendChild(image);
        } else {
          const video = document.createElement("video");
          video.src = safeUrl(String(src).trim());
          video.controls = true;
          figure.appendChild(video);
        }
        const figcaption = document.createElement("figcaption");
        figcaption.textContent = caption.trim() || (type === "image" ? "Image" : "Video");
        figure.appendChild(figcaption);
        body.appendChild(figure);
        const spacer = document.createElement("p");
        spacer.innerHTML = "<br>";
        body.appendChild(spacer);
        closeMediaPopover();
        scheduleAutoSave();
        showToast(type === "image" ? "Image inserted" : "Video inserted");
      };

      const readMediaFile = (type, file) => {
        if (!file) {
          return;
        }
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          insertMediaBlock(type, reader.result, file.name.replace(/\.[^.]+$/, ""));
        });
        reader.readAsDataURL(file);
      };

      const scheduleAutoSave = () => {
        updateLineMarker();
        setSaveState("Saving...");
        clearTimeout(editorSaveTimer);
        editorSaveTimer = setTimeout(() => {
          saveEditorPost();
          setSaveState("Saved");
        }, 650);
      };

      ["titleInput", "subtitleInput", "bodyInput", "authorInput", "tagsInput", "coverInput", "quoteInput", "featuredInput"].forEach(id => {
        document.getElementById(id)?.addEventListener("input", scheduleAutoSave);
        document.getElementById(id)?.addEventListener("change", scheduleAutoSave);
      });

      document.getElementById("titleInput").addEventListener("keydown", event => {
        if (event.key === "Enter") {
          event.preventDefault();
          normalizeTitleLine();
          activateBodyLine();
        } else if (event.key === "ArrowDown" && !document.getElementById("bodyInput").classList.contains("is-waiting")) {
          event.preventDefault();
          placeCaretAtStart(document.getElementById("bodyInput"));
          updateLineMarker();
        }
      });

      document.getElementById("titleInput").addEventListener("beforeinput", event => {
        if (event.inputType === "insertParagraph" || event.inputType === "insertLineBreak") {
          event.preventDefault();
          normalizeTitleLine();
          activateBodyLine();
        }
      });

      document.getElementById("titleInput").addEventListener("paste", event => {
        event.preventDefault();
        const text = (event.clipboardData || window.clipboardData).getData("text").replace(/\s*\n+\s*/g, " ");
        document.execCommand("insertText", false, text);
        normalizeTitleLine();
        scheduleAutoSave();
      });

      document.getElementById("bodyInput").addEventListener("keydown", event => {
        if (event.key === "ArrowUp" && isCaretAtStart(document.getElementById("bodyInput"))) {
          event.preventDefault();
          placeCaretAtEnd(document.getElementById("titleInput"));
          updateLineMarker();
        }
      });

      ["titleInput", "bodyInput"].forEach(id => {
        document.getElementById(id)?.addEventListener("focus", updateLineMarker);
        document.getElementById(id)?.addEventListener("keyup", updateLineMarker);
        document.getElementById(id)?.addEventListener("mouseup", updateLineMarker);
      });

      editorSelectionHandler = updateSelectionToolbar;
      editorScrollHandler = updateSelectionToolbar;
      editorResizeHandler = updateSelectionToolbar;
      document.addEventListener("selectionchange", editorSelectionHandler);
      window.addEventListener("scroll", editorScrollHandler, { passive: true });
      window.addEventListener("resize", editorResizeHandler);

      document.querySelectorAll("[data-format-command], [data-format-block]").forEach(button => {
        button.addEventListener("mousedown", event => {
          event.preventDefault();
        });
        button.addEventListener("click", () => runFormatCommand(button));
      });

      document.getElementById("publishButton").addEventListener("click", () => {
        const savedPost = saveEditorPost("draft");
        if (!savedPost) {
          showToast("Write something before publishing.");
          return;
        }
        setSaveState("Saved");
        location.hash = `#/publish/${encodeURIComponent(savedPost.id)}`;
      });

      document.getElementById("editorMoreButton").addEventListener("click", () => {
        const settings = document.getElementById("editorSettings");
        settings.hidden = !settings.hidden;
      });

      document.getElementById("closeEditorSettings").addEventListener("click", () => {
        document.getElementById("editorSettings").hidden = true;
      });

      document.getElementById("editorPlusButton").addEventListener("click", () => {
        const popover = document.getElementById("mediaInsertPopover");
        const plus = document.getElementById("editorPlusButton");
        const body = document.getElementById("bodyInput");
        if (document.activeElement?.id !== "bodyInput" && body && !getEditableMarkdown(body)) {
          placeCaretAtStart(body);
        }
        popover.hidden = !popover.hidden;
        plus.classList.toggle("is-open", !popover.hidden);
        plus.setAttribute("aria-expanded", String(!popover.hidden));
        if (!popover.hidden) {
          positionMediaPopover();
        }
      });

      document.querySelectorAll("[data-insert-media]").forEach(button => {
        button.addEventListener("click", () => {
          const type = button.dataset.insertMedia;
          document.getElementById(type === "image" ? "imageFileInput" : "videoFileInput")?.click();
        });
      });

      document.getElementById("imageFileInput")?.addEventListener("change", event => {
        readMediaFile("image", event.target.files?.[0]);
        event.target.value = "";
      });

      document.getElementById("videoFileInput")?.addEventListener("change", event => {
        readMediaFile("video", event.target.files?.[0]);
        event.target.value = "";
      });

      document.addEventListener("click", event => {
        const popover = document.getElementById("mediaInsertPopover");
        const plus = document.getElementById("editorPlusButton");
        if (!popover || popover.hidden || popover.contains(event.target) || plus?.contains(event.target)) {
          return;
        }
        closeMediaPopover();
      });

      updateLineMarker();
      requestAnimationFrame(() => placeCaretAtStart(document.getElementById("bodyInput")));
    }

    function renderManage() {
      const manageParams = getHashParams(location.hash);
      const allowedTabs = ["drafts", "scheduled", "published"];
      const activeTab = allowedTabs.includes(manageParams.get("tab")) ? manageParams.get("tab") : "drafts";
      applySeo({
        title: "Stories",
        description: "Manage drafts, scheduled stories, and published stories.",
        hash: `#/manage?tab=${activeTab}`
      });
      const posts = getPosts();
      const stats = getStats(posts);
      const claps = getClaps();
      const storyTabs = [
        ["drafts", "Drafts", stats.draft],
        ["scheduled", "Scheduled", stats.scheduled],
        ["published", "Published", stats.published]
      ];
      const statusByTab = {
        drafts: "draft",
        scheduled: "scheduled",
        published: "published"
      };
      const visiblePosts = posts.filter(post => post.status === statusByTab[activeTab]);
      const sectionTitle = storyTabs.find(tab => tab[0] === activeTab)?.[1] || "Drafts";
      const renderActions = post => {
        const copyItem = `<button type="button" data-copy-story-id="${escapeHtml(post.id)}">Copy link</button>`;
        const copyIconItem = `<button class="story-menu-icon-item" type="button" data-copy-story-id="${escapeHtml(post.id)}">${storyMenuIcon("link")}<span>Copy link</span></button>`;
        const shareIconItem = `<button class="story-menu-icon-item" type="button" data-share-story-id="${escapeHtml(post.id)}">${storyMenuIcon("share")}<span>Share</span></button>`;
        const deleteItem = post.source === "static"
          ? ""
          : `<button class="danger-item" type="button" data-delete-id="${escapeHtml(post.id)}">Delete story</button>`;
        let menuItems = "";
        if (post.source === "static") {
          menuItems = `
            ${copyItem}
            <a href="#/post/${encodeURIComponent(post.id)}">View story</a>
            <button type="button" disabled>Managed in files</button>
          `;
        } else if (post.status === "draft") {
          menuItems = `
            ${copyItem}
            <a href="#/write/${encodeURIComponent(post.id)}">Edit story</a>
            <a href="#/publish/${encodeURIComponent(post.id)}">Publish story</a>
            <a href="#/publish/${encodeURIComponent(post.id)}">View settings</a>
            ${deleteItem}
          `;
        } else if (post.status === "scheduled") {
          menuItems = `
            ${copyItem}
            <a href="#/write/${encodeURIComponent(post.id)}">Edit story</a>
            <button type="button" data-set-status="${escapeHtml(post.id)}" data-next-status="published">Publish now</button>
            <button type="button" data-set-status="${escapeHtml(post.id)}" data-next-status="draft">Move to drafts</button>
            <a href="#/publish/${encodeURIComponent(post.id)}">View settings</a>
            ${deleteItem}
          `;
        } else {
          menuItems = `
            <div class="story-menu-group">
              ${copyIconItem}
              ${shareIconItem}
            </div>
            <div class="story-menu-group">
              <a href="#/write/${encodeURIComponent(post.id)}">Edit story</a>
              <button type="button" data-submit-publication="${escapeHtml(post.id)}">Submit to publication</button>
            </div>
            <div class="story-menu-group">
              <a href="#/stats">View stats</a>
              <a href="#/publish/${encodeURIComponent(post.id)}">View settings</a>
            </div>
            <div class="story-menu-group">
              ${deleteItem}
            </div>
          `;
        }
        return `
          <div class="story-more-wrap">
            <button class="story-more-button" type="button" data-story-more aria-expanded="false" aria-label="More story actions">•••</button>
            <div class="article-more-menu story-more-menu" data-story-menu hidden>
              ${menuItems}
            </div>
          </div>
        `;
      };
      app.innerHTML = `
        <section class="stories-layout">
          ${renderLeftRail(stats)}
          <section class="manage-shell">
            <header class="manage-hero">
              <h1>Stories</h1>
              <button class="import-story-button" type="button" id="importStoryButton">Import a story</button>
            </header>
            <nav class="story-tabs" aria-label="Story filters">
              ${storyTabs.map(([key, label, count]) => `
                <a class="story-tab ${activeTab === key ? "active" : ""}" href="#/manage?tab=${key}">
                  <span class="story-tab-inner">
                    <span>${label}</span>
                    ${count > 0 ? `<span class="story-tab-count">${count}</span>` : ""}
                  </span>
                </a>
              `).join("")}
            </nav>
            <div class="manage-layout">
              <div class="manage-section-title">
                <h2>${sectionTitle}</h2>
                <span>${visiblePosts.length} story${visiblePosts.length === 1 ? "" : "ies"}</span>
              </div>
              <div class="story-list-head" aria-hidden="true">
                <span>Latest</span>
                <span>Publication</span>
                <span>Status</span>
                <span></span>
              </div>
              <div class="manage-list">
                ${visiblePosts.length ? visiblePosts.map(post => `
                  <article class="manage-row">
                    <div class="story-row-main">
                      ${renderStoryThumb(post)}
                      <div>
                        <h3><a href="#/post/${encodeURIComponent(post.id)}">${escapeHtml(post.title)}</a></h3>
                        <div class="story-row-meta-line">
                          <span>${getStoryFreshness(post)}</span>
                          <span>${escapeHtml(post.minutes)} min read</span>
                          <span>·</span>
                          <span>Updated just now</span>
                        </div>
                        <div class="story-row-stats">
                          <span aria-label="Claps">👏 ${Number(claps[post.id] || 0)}</span>
                        </div>
                      </div>
                    </div>
                    <div class="story-row-column">${post.source === "static" ? "Static" : "Self-published"}</div>
                    <div class="story-row-column">
                      <span>${getStoryStatusLabel(post.status)}</span>
                      ${post.status === "scheduled" && post.scheduledAt ? `<br><span>${escapeHtml(formatScheduleTime(post.scheduledAt))}</span>` : ""}
                    </div>
                    <div class="manage-actions">
                      ${renderActions(post)}
                    </div>
                  </article>
                `).join("") : `<div class="empty-state">No stories in ${sectionTitle.toLowerCase()}.</div>`}
              </div>
            </div>
          </section>
        </section>
      `;

      document.querySelectorAll("[data-delete-id]").forEach(button => {
        button.addEventListener("click", () => {
          const id = button.dataset.deleteId;
          deleteLocalPost(id);
          showToast("Story deleted");
          renderManage();
        });
      });

      document.querySelectorAll("[data-story-more]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          const menu = button.parentElement.querySelector("[data-story-menu]");
          const nextHidden = !menu.hidden;
          document.querySelectorAll("[data-story-menu]").forEach(item => {
            item.hidden = true;
          });
          document.querySelectorAll("[data-story-more]").forEach(item => {
            item.setAttribute("aria-expanded", "false");
          });
          menu.hidden = nextHidden;
          button.setAttribute("aria-expanded", String(!nextHidden));
        });
      });

      document.querySelectorAll("[data-story-menu]").forEach(menu => {
        menu.addEventListener("click", event => {
          event.stopPropagation();
        });
      });

      if (storyMenuCloseHandler) {
        document.removeEventListener("click", storyMenuCloseHandler);
      }
      storyMenuCloseHandler = () => {
        document.querySelectorAll("[data-story-menu]").forEach(menu => {
          menu.hidden = true;
        });
        document.querySelectorAll("[data-story-more]").forEach(button => {
          button.setAttribute("aria-expanded", "false");
        });
      };
      document.addEventListener("click", storyMenuCloseHandler);

      document.querySelectorAll("[data-copy-story-id]").forEach(button => {
        button.addEventListener("click", () => {
          sharePost(button.dataset.copyStoryId);
        });
      });

      document.querySelectorAll("[data-share-story-id]").forEach(button => {
        button.addEventListener("click", () => {
          shareStory(button.dataset.shareStoryId);
        });
      });

      document.querySelectorAll("[data-submit-publication]").forEach(button => {
        button.addEventListener("click", () => {
          showToast("Publication submission is not enabled for this personal site.");
        });
      });

      document.getElementById("importStoryButton")?.addEventListener("click", () => {
        showToast("Import story will be added in the next iteration.");
      });

      document.querySelectorAll("[data-toggle-featured]").forEach(button => {
        button.addEventListener("click", () => {
          const id = button.dataset.toggleFeatured;
          updateLocalPost(id, post => ({ ...post, featured: !post.featured }));
          showToast("Featured status updated");
          renderManage();
        });
      });

      document.querySelectorAll("[data-set-status]").forEach(button => {
        button.addEventListener("click", () => {
          const id = button.dataset.setStatus;
          const nextStatus = button.dataset.nextStatus;
          if (!["draft", "published"].includes(nextStatus)) {
            return;
          }
          updateLocalPost(id, post => ({
            ...post,
            status: nextStatus,
            scheduledAt: nextStatus === "published" ? "" : post.scheduledAt
          }));
          showToast(nextStatus === "published" ? "Story published" : "Moved to drafts");
          location.hash = `#/manage?tab=${nextStatus === "published" ? "published" : "drafts"}`;
          renderManage();
        });
      });

      document.getElementById("exportButton")?.addEventListener("click", async () => {
        const data = JSON.stringify(getLocalPosts(), null, 2);
        try {
          await navigator.clipboard.writeText(data);
          showToast("JSON copied to clipboard");
        } catch {
          const importInput = document.getElementById("importInput");
          if (importInput) {
            importInput.value = data;
          }
          showToast("Unable to copy JSON.");
        }
      });

      document.getElementById("importButton")?.addEventListener("click", () => {
        const raw = document.getElementById("importInput")?.value.trim() || "";
        if (!raw) {
          showToast("Paste JSON first");
          return;
        }

        try {
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) {
            throw new Error("Invalid format");
          }
          savePosts(parsed.map(normalizePost));
          showToast("Stories imported");
          renderManage();
        } catch {
          showToast("Invalid JSON format");
        }
      });

      document.getElementById("resetButton")?.addEventListener("click", () => {
        savePosts(DEFAULT_POSTS);
        saveClaps({});
        showToast("Local stories reset");
        renderManage();
      });
    }

    function route() {
      const hash = location.hash || "#/";
      window.scrollTo(0, 0);
      clearTimeout(editorSaveTimer);
      if (editorSelectionHandler) {
        document.removeEventListener("selectionchange", editorSelectionHandler);
        editorSelectionHandler = null;
      }
      if (editorScrollHandler) {
        window.removeEventListener("scroll", editorScrollHandler);
        editorScrollHandler = null;
      }
      if (editorResizeHandler) {
        window.removeEventListener("resize", editorResizeHandler);
        editorResizeHandler = null;
      }
      document.body.classList.toggle("editor-mode", hash.startsWith("#/write"));
      savePopover.hidden = true;
      const onHome = !hash || hash === "#/";
      const onSearch = hash.startsWith("#/search");

      if (!onHome && !onSearch && state.search) {
        state.search = "";
        globalSearch.value = "";
      }

      if (hash.startsWith("#/post/")) {
        renderPost(decodeURIComponent(hash.replace("#/post/", "")));
      } else if (onSearch) {
        renderSearch();
      } else if (hash.startsWith("#/tag/")) {
        renderTagPage(hash.replace("#/tag/", ""));
      } else if (hash.startsWith("#/publish-success/")) {
        renderPublishSuccess(decodeURIComponent(hash.replace("#/publish-success/", "")));
      } else if (hash.startsWith("#/publish/")) {
        renderPublishConfirm(decodeURIComponent(hash.replace("#/publish/", "")));
      } else if (hash.startsWith("#/write/")) {
        renderEditor(decodeURIComponent(hash.replace("#/write/", "")));
      } else if (hash === "#/write") {
        renderEditor();
      } else if (hash === "#/library") {
        renderLibrary();
      } else if (hash.startsWith("#/stats")) {
        renderStats();
      } else if (hash.startsWith("#/manage")) {
        renderManage();
      } else {
        renderHome();
      }

      updateProgress();
    }

    menuButton.addEventListener("click", () => {
      setSidebarCollapsed(!document.body.classList.contains("sidebar-collapsed"));
    });

    globalSearch.addEventListener("input", event => {
      state.search = event.target.value.trim();
      if (state.search) {
        const nextHash = searchHash(state.search, state.searchTab);
        if (location.hash !== nextHash) {
          location.hash = nextHash;
        } else {
          renderSearch();
        }
      } else {
        location.hash = "#/search";
      }
    });

    window.addEventListener("keydown", event => {
      if (event.key === "/" && document.activeElement !== globalSearch && !["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) {
        event.preventDefault();
        globalSearch.focus();
      }
    });

    window.addEventListener("hashchange", route);
    window.addEventListener("scroll", updateProgress, { passive: true });
    window.addEventListener("resize", updateProgress);
    route();
    Promise.all([loadSiteConfig(), loadStaticPosts()]).then(() => route());
  </script>
</body>
</html>
